apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telegram-bot-on-llm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DmytroKrynytsyn/telegram-bot-on-llm
    targetRevision: HEAD
    path: helm/bot
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: telegram-bot-on-llm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true